<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Лист А1: Схема взаимодействия резидента с аппаратурой
  Размер: 841 × 594 мм (альбомная)
  Воробьев Е. А., ИУ5-42Б, вариант №5
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="841mm" height="594mm" viewBox="0 0 841 594"
     font-family="Times New Roman, serif" font-size="3.5">

  <style>
    .frame-out { fill: none; stroke: black; stroke-width: 1.0; }
    .stamp-line { stroke: black; stroke-width: 0.5; fill: none; }
    .stamp-line-thick { stroke: black; stroke-width: 1.0; fill: none; }
    .label { font-size: 2.5; }
    .title { font-size: 6; font-weight: bold; text-anchor: middle; }
    .hw-box { fill: #f5f5f5; stroke: black; stroke-width: 0.7; }
    .sw-box { fill: white; stroke: black; stroke-width: 0.7; }
    .mem-box { fill: #fff8e8; stroke: black; stroke-width: 0.7; }
    .res-box { fill: #e8f0ff; stroke: black; stroke-width: 0.9; }
    .box-title { font-size: 4; font-weight: bold; text-anchor: middle; }
    .box-text { font-size: 3; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: black; stroke-width: 0.6; fill: none; }
    .arrow-thick { stroke: black; stroke-width: 1.0; fill: none; }
    .arrow-dash { stroke: black; stroke-width: 0.5; fill: none; stroke-dasharray: 2,1; }
    .arrow-label { font-size: 2.8; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="black"/>
    </marker>
  </defs>

  <!-- Внешняя рамка листа -->
  <rect class="frame-out" x="0" y="0" width="841" height="594"/>
  <rect class="frame-out" x="20" y="5" width="816" height="584"/>

  <!-- ─── Заголовок ─── -->
  <text class="title" x="420" y="22">СХЕМА ВЗАИМОДЕЙСТВИЯ РЕЗИДЕНТА С АППАРАТУРОЙ</text>
  <line x1="240" y1="26" x2="600" y2="26" stroke="black" stroke-width="0.5"/>

  <!-- ═══════════════ АППАРАТУРА (левая колонка) ═══════════════ -->
  <text x="120" y="42" class="box-title" font-size="5">Аппаратура</text>
  <line x1="40" y1="46" x2="200" y2="46" stroke="black" stroke-width="0.5"/>

  <!-- Клавиатура -->
  <rect class="hw-box" x="40" y="60" width="160" height="35"/>
  <text class="box-title" x="120" y="73">Клавиатура (8042)</text>
  <text class="box-text" x="120" y="82">контроллер PS/2</text>
  <text class="box-text" x="120" y="90">→ скан-код в порт 60h</text>

  <!-- Системный таймер -->
  <rect class="hw-box" x="40" y="120" width="160" height="35"/>
  <text class="box-title" x="120" y="133">Системный таймер 8253</text>
  <text class="box-text" x="120" y="142">тиков 18.2 Гц</text>
  <text class="box-text" x="120" y="150">→ IRQ0 каждые 55 мс</text>

  <!-- Контроллер прерываний 8259A -->
  <rect class="hw-box" x="40" y="180" width="160" height="50"/>
  <text class="box-title" x="120" y="195">Контроллер 8259A</text>
  <text class="box-text" x="120" y="204">IRQ0 → INT 08h (таймер)</text>
  <text class="box-text" x="120" y="212">IRQ1 → INT 09h (клавиатура)</text>
  <text class="box-text" x="120" y="220">приоритет, маски IMR</text>

  <!-- Дисплей VGA -->
  <rect class="hw-box" x="40" y="260" width="160" height="35"/>
  <text class="box-title" x="120" y="273">Дисплей VGA</text>
  <text class="box-text" x="120" y="282">текстовый режим 80×25</text>
  <text class="box-text" x="120" y="290">видеопамять B800h</text>

  <!-- Центральный процессор -->
  <rect class="hw-box" x="40" y="320" width="160" height="45"/>
  <text class="box-title" x="120" y="333">Центральный процессор</text>
  <text class="box-text" x="120" y="342">i8086</text>
  <text class="box-text" x="120" y="350">регистры, флаги IF</text>
  <text class="box-text" x="120" y="358">обработка прерываний</text>

  <!-- ═══════════════ ВЕКТОР ПРЕРЫВАНИЙ (центр) ═══════════════ -->
  <text x="320" y="42" class="box-title" font-size="5">Вектор прерываний (0000h:xxxxh)</text>
  <line x1="240" y1="46" x2="400" y2="46" stroke="black" stroke-width="0.5"/>

  <rect class="mem-box" x="240" y="60" width="160" height="35"/>
  <text class="box-title" x="320" y="72">0000h:0024h (INT 09h)</text>
  <text class="box-text" x="320" y="82">CS:IP = адрес new_int9h</text>
  <text class="box-text" x="320" y="90">(старый сохранён в old_int9h*)</text>

  <rect class="mem-box" x="240" y="120" width="160" height="35"/>
  <text class="box-title" x="320" y="132">0000h:0070h (INT 1Ch)</text>
  <text class="box-text" x="320" y="142">CS:IP = адрес new_int1Ch</text>
  <text class="box-text" x="320" y="150">(старый в old_int1Ch*)</text>

  <rect class="mem-box" x="240" y="180" width="160" height="35"/>
  <text class="box-title" x="320" y="192">0000h:00BCh (INT 2Fh)</text>
  <text class="box-text" x="320" y="202">CS:IP = адрес new_int2Fh</text>
  <text class="box-text" x="320" y="210">(старый в old_int2Fh*)</text>

  <!-- Буфер клавиатуры BIOS -->
  <rect class="mem-box" x="240" y="240" width="160" height="35"/>
  <text class="box-title" x="320" y="253">BIOS Data Area</text>
  <text class="box-text" x="320" y="262">0040h:001Eh — буфер клавиш</text>
  <text class="box-text" x="320" y="270">0040h:001Ch — указатель хвоста</text>

  <!-- Видеопамять -->
  <rect class="mem-box" x="240" y="300" width="160" height="35"/>
  <text class="box-title" x="320" y="313">Видеопамять B800h</text>
  <text class="box-text" x="320" y="322">25 строк × 80 столбцов</text>
  <text class="box-text" x="320" y="330">символ + атрибут (2 байта)</text>

  <!-- ═══════════════ РЕЗИДЕНТ TSR (правая колонка) ═══════════════ -->
  <text x="600" y="42" class="box-title" font-size="5">Резидент tsr.com (вариант №5)</text>
  <line x1="490" y1="46" x2="720" y2="46" stroke="black" stroke-width="0.5"/>

  <!-- new_int9h -->
  <rect class="res-box" x="490" y="60" width="230" height="50"/>
  <text class="box-title" x="605" y="72">new_int9h (обработчик клавиатуры)</text>
  <text class="box-text" x="605" y="82">in AL, 60h ← чтение скан-кода</text>
  <text class="box-text" x="605" y="90">cmp AL, F8/F9/F1/F2 → флаги</text>
  <text class="box-text" x="605" y="98">call old_int9h (chain)</text>
  <text class="box-text" x="605" y="106">обработка буфера 40h:1Eh</text>

  <!-- new_int1Ch -->
  <rect class="res-box" x="490" y="120" width="230" height="45"/>
  <text class="box-title" x="605" y="132">new_int1Ch (обработчик таймера)</text>
  <text class="box-text" x="605" y="142">counter++ если F8 активна</text>
  <text class="box-text" x="605" y="150">через 5 секунд → printSignature</text>
  <text class="box-text" x="605" y="158">call old_int1Ch (chain)</text>

  <!-- new_int2Fh -->
  <rect class="res-box" x="490" y="180" width="230" height="50"/>
  <text class="box-title" x="605" y="192">new_int2Fh (мультиплексор)</text>
  <text class="box-text" x="605" y="202">AH=FFh, AL=0 → AH='i' (проверка)</text>
  <text class="box-text" x="605" y="210">AH=FFh, AL=1 → выгрузка</text>
  <text class="box-text" x="605" y="218">иначе → jmp old_int2Fh</text>

  <!-- Сегмент данных -->
  <rect class="res-box" x="490" y="240" width="230" height="50"/>
  <text class="box-title" x="605" y="252">Сегмент данных</text>
  <text class="box-text" x="605" y="262">signaturePrintingEnabled, cursiveEnabled,</text>
  <text class="box-text" x="605" y="270">translateEnabled, ignoreEnabled,</text>
  <text class="box-text" x="605" y="278">old_int9h*, old_int1Ch*, old_int2Fh*,</text>
  <text class="box-text" x="605" y="286">cursiveSymbol, savedSymbol, signatureLine1..3</text>

  <!-- printSignature, setCursive, changeFx -->
  <rect class="res-box" x="490" y="300" width="230" height="45"/>
  <text class="box-title" x="605" y="312">Процедуры вывода</text>
  <text class="box-text" x="605" y="322">printSignature → INT 10h, AH=13h</text>
  <text class="box-text" x="605" y="330">setCursive → INT 10h, AH=11h</text>
  <text class="box-text" x="605" y="338">changeFx → индикатор F8/F9/F1/F2</text>

  <!-- ═══════════════ СВЯЗИ ═══════════════ -->

  <!-- Клавиатура → Контроллер -->
  <path class="arrow" d="M 120 95 L 120 180" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="125" y="125">IRQ1</text>
  <text class="arrow-label" x="125" y="135">скан-код</text>

  <!-- Таймер → Контроллер -->
  <path class="arrow" d="M 120 155 L 120 180" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="125" y="170">IRQ0</text>

  <!-- Контроллер → CPU -->
  <path class="arrow" d="M 120 230 L 120 320" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="125" y="275">INT 08h/09h</text>

  <!-- CPU → Вектор прерываний -->
  <path class="arrow-thick" d="M 200 342 L 220 342 L 220 78 L 240 78" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="206" y="200">CS:IP / Flags</text>
  <text class="arrow-label" x="206" y="208">из вектора</text>

  <!-- CPU → INT 1Ch вектор -->
  <path class="arrow-thick" d="M 200 342 L 220 342 L 220 138 L 240 138" marker-end="url(#arrow)"/>

  <!-- INT 2Fh: программное прерывание из приложения → вектор -->
  <path class="arrow-dash" d="M 200 342 L 220 342 L 220 198 L 240 198" marker-end="url(#arrow)"/>

  <!-- Вектор INT 09h → new_int9h -->
  <path class="arrow-thick" d="M 400 78 L 490 78" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="430" y="76">JMP FAR</text>

  <!-- Вектор INT 1Ch → new_int1Ch -->
  <path class="arrow-thick" d="M 400 138 L 490 138" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="430" y="136">JMP FAR</text>

  <!-- Вектор INT 2Fh → new_int2Fh -->
  <path class="arrow-thick" d="M 400 198 L 490 198" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="430" y="196">JMP FAR</text>

  <!-- new_int9h → BIOS Data Area (буфер клавиш) -->
  <path class="arrow" d="M 490 95 L 460 95 L 460 252 L 400 252" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="463" y="160">обработка</text>
  <text class="arrow-label" x="463" y="168">буфера</text>

  <!-- new_int1Ch → printSignature вызов (внутри резидента, показано как ссылка вниз) -->
  <path class="arrow-dash" d="M 605 165 L 605 300" marker-end="url(#arrow)"/>

  <!-- printSignature → видеопамять -->
  <path class="arrow" d="M 490 322 L 400 322" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="430" y="320">INT 10h</text>

  <!-- ═══════════════ Легенда ═══════════════ -->
  <rect class="sw-box" x="40" y="400" width="320" height="100" fill="#fafafa"/>
  <text x="50" y="412" font-size="4" font-weight="bold">Условные обозначения:</text>

  <rect class="hw-box" x="50" y="420" width="20" height="10"/>
  <text x="75" y="427" font-size="3.2">— аппаратный компонент</text>

  <rect class="mem-box" x="50" y="435" width="20" height="10"/>
  <text x="75" y="442" font-size="3.2">— область памяти / вектор прерываний</text>

  <rect class="res-box" x="50" y="450" width="20" height="10"/>
  <text x="75" y="457" font-size="3.2">— модуль резидентной программы tsr.com</text>

  <path class="arrow-thick" d="M 50 470 L 70 470" marker-end="url(#arrow)"/>
  <text x="75" y="471" font-size="3.2">— основной поток управления (вектор прерываний)</text>

  <path class="arrow" d="M 50 480 L 70 480" marker-end="url(#arrow)"/>
  <text x="75" y="481" font-size="3.2">— аппаратное прерывание / поток данных</text>

  <path class="arrow-dash" d="M 50 490 L 70 490" marker-end="url(#arrow)"/>
  <text x="75" y="491" font-size="3.2">— программное прерывание (INT 2Fh)</text>

  <!-- Описание сценария взаимодействия -->
  <rect class="sw-box" x="380" y="400" width="440" height="100" fill="#fafafa"/>
  <text x="390" y="412" font-size="4" font-weight="bold">Сценарий взаимодействия (на примере F8):</text>
  <text x="390" y="424" font-size="3.2">1) Пользователь нажимает клавишу F8. Контроллер клавиатуры 8042 формирует скан-код 0x42</text>
  <text x="390" y="432" font-size="3.2">    и подаёт сигнал IRQ1 на ведущий контроллер прерываний 8259A.</text>
  <text x="390" y="442" font-size="3.2">2) CPU прерывает текущее выполнение, обращается к вектору 0000h:0024h и переходит</text>
  <text x="390" y="450" font-size="3.2">    на new_int9h, которая читает порт 60h и устанавливает signaturePrintingEnabled = 1.</text>
  <text x="390" y="460" font-size="3.2">3) При очередном тике таймера (INT 1Ch) new_int1Ch инкрементирует counter. Через 91 тик</text>
  <text x="390" y="468" font-size="3.2">    (≈ 5 секунд) вызывается printSignature.</text>
  <text x="390" y="478" font-size="3.2">4) printSignature через INT 10h функция 13h выводит три строки подписи в видеопамять</text>
  <text x="390" y="486" font-size="3.2">    B800h в верхнюю часть экрана. Флаг сбрасывается, индикатор F8 становится красным.</text>

  <!-- ─── ОСНОВНАЯ НАДПИСЬ (штамп ГОСТ 2.104) ─── -->
  <g transform="translate(651, 534)">
    <rect class="stamp-line-thick" x="0" y="0" width="185" height="55"/>

    <line class="stamp-line" x1="7" y1="0" x2="7" y2="25"/>
    <line class="stamp-line" x1="17" y1="0" x2="17" y2="25"/>
    <line class="stamp-line" x1="40" y1="0" x2="40" y2="25"/>
    <line class="stamp-line" x1="55" y1="0" x2="55" y2="25"/>
    <line class="stamp-line" x1="65" y1="0" x2="65" y2="25"/>

    <line class="stamp-line" x1="0" y1="5" x2="65" y2="5"/>
    <text x="3.5" y="3.5" class="label" text-anchor="middle">Изм</text>
    <text x="12" y="3.5" class="label" text-anchor="middle">Лист</text>
    <text x="28.5" y="3.5" class="label" text-anchor="middle">№ докум.</text>
    <text x="47.5" y="3.5" class="label" text-anchor="middle">Подп.</text>
    <text x="60" y="3.5" class="label" text-anchor="middle">Дата</text>

    <line class="stamp-line" x1="0" y1="10" x2="65" y2="10"/>
    <line class="stamp-line" x1="0" y1="15" x2="65" y2="15"/>
    <line class="stamp-line" x1="0" y1="20" x2="65" y2="20"/>
    <line class="stamp-line" x1="0" y1="25" x2="185" y2="25"/>

    <line class="stamp-line" x1="23" y1="25" x2="23" y2="55"/>
    <line class="stamp-line" x1="0" y1="32" x2="65" y2="32"/>
    <line class="stamp-line" x1="0" y1="39" x2="65" y2="39"/>
    <line class="stamp-line" x1="0" y1="46" x2="65" y2="46"/>

    <text x="2" y="29" class="label">Разраб.</text>
    <text x="2" y="36" class="label">Пров.</text>
    <text x="2" y="43" class="label">Т.контр.</text>
    <text x="2" y="50" class="label">Н.контр.</text>
    <text x="2" y="54" class="label">Утв.</text>

    <text x="25" y="29" class="label">Воробьев Е. А.</text>
    <text x="25" y="36" class="label">Большаков С. А.</text>

    <line class="stamp-line" x1="40" y1="25" x2="40" y2="55"/>
    <line class="stamp-line" x1="55" y1="25" x2="55" y2="55"/>
    <text x="57" y="29" class="label">2026</text>
    <text x="57" y="36" class="label">2026</text>

    <line class="stamp-line" x1="120" y1="25" x2="120" y2="55"/>
    <line class="stamp-line" x1="120" y1="40" x2="185" y2="40"/>
    <line class="stamp-line" x1="120" y1="48" x2="185" y2="48"/>

    <text x="92" y="32" class="label" text-anchor="middle" font-weight="bold">КР СП ИУ5-42Б</text>
    <text x="92" y="40" class="label" text-anchor="middle" font-weight="bold">Резидентная программа</text>
    <text x="92" y="48" class="label" text-anchor="middle">(вариант №5)</text>
    <text x="92" y="54" class="label" text-anchor="middle">Воробьев Е. А.</text>

    <text x="135" y="32" class="label" text-anchor="middle">Схема</text>
    <text x="135" y="37" class="label" text-anchor="middle">КР</text>
    <text x="152" y="32" class="label" text-anchor="middle">Лит.</text>
    <text x="152" y="37" class="label" text-anchor="middle">У</text>
    <text x="172" y="32" class="label" text-anchor="middle">Лист</text>
    <text x="172" y="37" class="label" text-anchor="middle">1</text>

    <text x="152" y="46" class="label" text-anchor="middle">Листов</text>
    <text x="152" y="52" class="label" text-anchor="middle">1</text>

    <text x="152" y="53" class="label" text-anchor="middle">МГТУ им. Н.Э. Баумана, ИУ-5</text>
  </g>

  <text x="25" y="589" class="label" transform="rotate(-90, 25, 589)">Курсовая работа по дисциплине «Системное программирование»</text>
</svg>
