<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Лист А1: Модульная структура программы (горизонтальная ориентация)
  Размер: 841 × 594 мм
  Воробьев Е. А., ИУ5-42Б, вариант №5
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="841mm" height="594mm" viewBox="0 0 841 594"
     font-family="Times New Roman, serif" font-size="3.5">

  <style>
    .frame { fill: none; stroke: black; stroke-width: 0.5; }
    .frame-out { fill: none; stroke: black; stroke-width: 1.0; }
    .stamp-line { stroke: black; stroke-width: 0.5; fill: none; }
    .stamp-line-thick { stroke: black; stroke-width: 1.0; fill: none; }
    .label { font-size: 2.5; }
    .title { font-size: 6; font-weight: bold; text-anchor: middle; }
    .module-box { fill: white; stroke: black; stroke-width: 0.7; }
    .module-text { font-size: 3.5; text-anchor: middle; dominant-baseline: middle; }
    .module-text-bold { font-size: 4; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: black; stroke-width: 0.6; fill: none; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
  </defs>

  <!-- Внешняя рамка листа -->
  <rect class="frame-out" x="0" y="0" width="841" height="594"/>

  <!-- Внутренняя рамка ГОСТ 2.104 (поля 20 слева, 5 справа, сверху, снизу) -->
  <rect class="frame-out" x="20" y="5" width="816" height="584"/>

  <!-- ─── Заголовок листа ─── -->
  <text class="title" x="420" y="22">МОДУЛЬНАЯ СТРУКТУРА ПРОГРАММЫ</text>
  <line x1="280" y1="26" x2="560" y2="26" stroke="black" stroke-width="0.5"/>

  <!-- ─── Корневой блок ─── -->
  <rect class="module-box" x="350" y="40" width="140" height="22"/>
  <text class="module-text-bold" x="420" y="48">Резидентная программа tsr.com</text>
  <text class="module-text" x="420" y="55">(вариант №5, ИУ5-42Б)</text>

  <!-- Линии от корня -->
  <path class="arrow" d="M 420 62 L 420 80 L 150 80 L 150 100" marker-end="url(#arrow)"/>
  <path class="arrow" d="M 420 62 L 420 80 L 420 100" marker-end="url(#arrow)"/>
  <path class="arrow" d="M 420 62 L 420 80 L 690 80 L 690 100" marker-end="url(#arrow)"/>

  <!-- ─── Три заголовка частей ─── -->
  <rect class="module-box" x="80" y="100" width="140" height="20" fill="#e8e8e8"/>
  <text class="module-text-bold" x="150" y="113">Резидентная часть</text>

  <rect class="module-box" x="350" y="100" width="140" height="20" fill="#e8e8e8"/>
  <text class="module-text-bold" x="420" y="113">Инициализирующая часть</text>

  <rect class="module-box" x="620" y="100" width="140" height="20" fill="#e8e8e8"/>
  <text class="module-text-bold" x="690" y="113">Часть выгрузки</text>

  <!-- ─── Резидентная часть: блоки ─── -->
  <line class="frame" x1="150" y1="120" x2="150" y2="135" stroke="black"/>

  <rect class="module-box" x="80" y="135" width="140" height="22"/>
  <text class="module-text-bold" x="150" y="143">Сегмент данных</text>
  <text class="module-text" x="150" y="150">флаги, буферы, старые векторы</text>

  <rect class="module-box" x="80" y="165" width="140" height="22"/>
  <text class="module-text-bold" x="150" y="173">new_int9h</text>
  <text class="module-text" x="150" y="180">обработчик клавиатуры (09h)</text>

  <rect class="module-box" x="80" y="195" width="140" height="22"/>
  <text class="module-text-bold" x="150" y="203">new_int1Ch</text>
  <text class="module-text" x="150" y="210">обработчик таймера (1Ch)</text>

  <rect class="module-box" x="80" y="225" width="140" height="22"/>
  <text class="module-text-bold" x="150" y="233">new_int2Fh</text>
  <text class="module-text" x="150" y="240">мультиплексор (2Fh)</text>

  <rect class="module-box" x="80" y="255" width="140" height="22"/>
  <text class="module-text-bold" x="150" y="263">printSignature</text>
  <text class="module-text" x="150" y="270">вывод подписи в рамке</text>

  <rect class="module-box" x="80" y="285" width="140" height="22"/>
  <text class="module-text-bold" x="150" y="293">setCursive</text>
  <text class="module-text" x="150" y="300">курсив буквы «З» (F9)</text>

  <rect class="module-box" x="80" y="315" width="140" height="22"/>
  <text class="module-text-bold" x="150" y="323">saveFont / changeFont</text>
  <text class="module-text" x="150" y="330">работа со шрифтом VGA</text>

  <rect class="module-box" x="80" y="345" width="140" height="22"/>
  <text class="module-text-bold" x="150" y="353">changeFx</text>
  <text class="module-text" x="150" y="360">индикатор F8/F9/F1/F2</text>

  <!-- Связующая вертикаль -->
  <line class="frame" x1="65" y1="146" x2="65" y2="356" stroke="black"/>
  <line class="frame" x1="65" y1="146" x2="80" y2="146"/>
  <line class="frame" x1="65" y1="176" x2="80" y2="176"/>
  <line class="frame" x1="65" y1="206" x2="80" y2="206"/>
  <line class="frame" x1="65" y1="236" x2="80" y2="236"/>
  <line class="frame" x1="65" y1="266" x2="80" y2="266"/>
  <line class="frame" x1="65" y1="296" x2="80" y2="296"/>
  <line class="frame" x1="65" y1="326" x2="80" y2="326"/>
  <line class="frame" x1="65" y1="356" x2="80" y2="356"/>
  <line class="frame" x1="65" y1="120" x2="65" y2="146"/>
  <line class="frame" x1="65" y1="120" x2="150" y2="120"/>

  <!-- ─── Инициализирующая часть: блоки ─── -->
  <line class="frame" x1="420" y1="120" x2="420" y2="135" stroke="black"/>

  <rect class="module-box" x="350" y="135" width="140" height="22"/>
  <text class="module-text-bold" x="420" y="143">_initTSR</text>
  <text class="module-text" x="420" y="150">точка входа программы</text>

  <rect class="module-box" x="350" y="165" width="140" height="22"/>
  <text class="module-text-bold" x="420" y="173">commandParamsParser</text>
  <text class="module-text" x="420" y="180">разбор `/?` и пустой строки</text>

  <rect class="module-box" x="350" y="195" width="140" height="22"/>
  <text class="module-text-bold" x="420" y="203">Сохранение векторов</text>
  <text class="module-text" x="420" y="210">old_int9h*, 1Ch*, 2Fh*</text>

  <rect class="module-box" x="350" y="225" width="140" height="22"/>
  <text class="module-text-bold" x="420" y="233">Установка обработчиков</text>
  <text class="module-text" x="420" y="240">INT 21h, AH=25xx</text>

  <rect class="module-box" x="350" y="255" width="140" height="22"/>
  <text class="module-text-bold" x="420" y="263">int 27h (TSR-exit)</text>
  <text class="module-text" x="420" y="270">резидентное завершение</text>

  <!-- Связующая вертикаль -->
  <line class="frame" x1="335" y1="146" x2="335" y2="266" stroke="black"/>
  <line class="frame" x1="335" y1="146" x2="350" y2="146"/>
  <line class="frame" x1="335" y1="176" x2="350" y2="176"/>
  <line class="frame" x1="335" y1="206" x2="350" y2="206"/>
  <line class="frame" x1="335" y1="236" x2="350" y2="236"/>
  <line class="frame" x1="335" y1="266" x2="350" y2="266"/>
  <line class="frame" x1="335" y1="120" x2="335" y2="146"/>
  <line class="frame" x1="335" y1="120" x2="420" y2="120"/>

  <!-- ─── Часть выгрузки ─── -->
  <line class="frame" x1="690" y1="120" x2="690" y2="135" stroke="black"/>

  <rect class="module-box" x="620" y="135" width="140" height="22"/>
  <text class="module-text-bold" x="690" y="143">Восстановление векторов</text>
  <text class="module-text" x="690" y="150">INT 21h, AH=25xx</text>

  <rect class="module-box" x="620" y="165" width="140" height="22"/>
  <text class="module-text-bold" x="690" y="173">Освобождение PSP</text>
  <text class="module-text" x="690" y="180">INT 21h, AH=49h</text>

  <rect class="module-box" x="620" y="195" width="140" height="22"/>
  <text class="module-text-bold" x="690" y="203">Освобождение тела</text>
  <text class="module-text" x="690" y="210">INT 21h, AH=49h</text>

  <rect class="module-box" x="620" y="225" width="140" height="22"/>
  <text class="module-text-bold" x="690" y="233">Вывод сообщения</text>
  <text class="module-text" x="690" y="240">«Резидент выгружен»</text>

  <!-- Связующая вертикаль -->
  <line class="frame" x1="605" y1="146" x2="605" y2="236" stroke="black"/>
  <line class="frame" x1="605" y1="146" x2="620" y2="146"/>
  <line class="frame" x1="605" y1="176" x2="620" y2="176"/>
  <line class="frame" x1="605" y1="206" x2="620" y2="206"/>
  <line class="frame" x1="605" y1="236" x2="620" y2="236"/>
  <line class="frame" x1="605" y1="120" x2="605" y2="146"/>
  <line class="frame" x1="605" y1="120" x2="690" y2="120"/>

  <!-- ─── Пояснения внизу ─── -->
  <rect class="module-box" x="80" y="400" width="680" height="90" fill="#fafafa"/>
  <text x="90" y="412" font-size="4" font-weight="bold">Пояснения к структуре:</text>
  <text x="90" y="424" font-size="3.5">
    1) Резидентная часть содержит сегмент данных и пять обработчиков/процедур.</text>
  <text x="90" y="434" font-size="3.5">
    2) Инициализирующая часть выполняется один раз — при первом запуске tsr.com.</text>
  <text x="90" y="444" font-size="3.5">
    3) Часть выгрузки активируется при повторном запуске tsr.com без параметров</text>
  <text x="90" y="454" font-size="3.5">
    (специальное требование группы ИУ5-42Б) и встроена в обработчик new_int2Fh.</text>
  <text x="90" y="466" font-size="3.5">
    4) Переопределяемые прерывания: INT 09h (клавиатура), INT 1Ch (таймер), INT 2Fh (мультиплексор).</text>
  <text x="90" y="478" font-size="3.5">
    5) Резидентная часть остаётся в памяти после INT 27h; адреса старых обработчиков</text>
  <text x="90" y="488" font-size="3.5">
    сохраняются в переменных old_int9h*, old_int1Ch*, old_int2Fh* для последующего восстановления.</text>

  <!-- ─── ОСНОВНАЯ НАДПИСЬ (штамп ГОСТ 2.104 форма 1) ─── -->
  <!-- Размер штампа: 185×55, в правом нижнем углу внутри внутренней рамки -->
  <!-- Положение: x = 836-185 = 651, y = 589-55 = 534 -->
  <g transform="translate(651, 534)">
    <!-- Внешний контур штампа -->
    <rect class="stamp-line-thick" x="0" y="0" width="185" height="55"/>

    <!-- Графа 14-18 (полоса слева 65 мм × 55 мм, разделена на ряды) -->
    <!-- Колонки: Изм | Лист | № докум. | Подп. | Дата (5 колонок по 7-10 мм) -->
    <line class="stamp-line" x1="7" y1="0" x2="7" y2="25"/>
    <line class="stamp-line" x1="17" y1="0" x2="17" y2="25"/>
    <line class="stamp-line" x1="40" y1="0" x2="40" y2="25"/>
    <line class="stamp-line" x1="55" y1="0" x2="55" y2="25"/>
    <line class="stamp-line" x1="65" y1="0" x2="65" y2="25"/>

    <!-- Заголовочный ряд (5 мм) -->
    <line class="stamp-line" x1="0" y1="5" x2="65" y2="5"/>
    <text x="3.5" y="3.5" class="label" text-anchor="middle">Изм</text>
    <text x="12" y="3.5" class="label" text-anchor="middle">Лист</text>
    <text x="28.5" y="3.5" class="label" text-anchor="middle">№ докум.</text>
    <text x="47.5" y="3.5" class="label" text-anchor="middle">Подп.</text>
    <text x="60" y="3.5" class="label" text-anchor="middle">Дата</text>

    <!-- Левая колонка ниже: 4 строки × 5 мм = 20 мм -->
    <line class="stamp-line" x1="0" y1="10" x2="65" y2="10"/>
    <line class="stamp-line" x1="0" y1="15" x2="65" y2="15"/>
    <line class="stamp-line" x1="0" y1="20" x2="65" y2="20"/>
    <line class="stamp-line" x1="0" y1="25" x2="185" y2="25"/>

    <!-- Графы 10-13: Разраб./Пров./Утв. (колонка 23 мм слева) -->
    <line class="stamp-line" x1="23" y1="25" x2="23" y2="55"/>

    <!-- В этой колонке: Разраб., Пров., Утв., Н.контр. -->
    <line class="stamp-line" x1="0" y1="32" x2="65" y2="32"/>
    <line class="stamp-line" x1="0" y1="39" x2="65" y2="39"/>
    <line class="stamp-line" x1="0" y1="46" x2="65" y2="46"/>

    <text x="2" y="29" class="label">Разраб.</text>
    <text x="2" y="36" class="label">Пров.</text>
    <text x="2" y="43" class="label">Т.контр.</text>
    <text x="2" y="50" class="label">Н.контр.</text>
    <text x="2" y="54" class="label">Утв.</text>

    <!-- ФИО исполнителя в графе 11 -->
    <text x="25" y="29" class="label">Воробьев Е. А.</text>
    <text x="25" y="36" class="label">Большаков С. А.</text>

    <!-- Графа 12 — Подпись (узкая, 35 мм) -->
    <line class="stamp-line" x1="40" y1="25" x2="40" y2="55"/>
    <text x="42" y="29" class="label"></text>

    <!-- Графа 13 — Дата (узкая, 20 мм) -->
    <line class="stamp-line" x1="55" y1="25" x2="55" y2="55"/>
    <text x="57" y="29" class="label">2026</text>
    <text x="57" y="36" class="label">2026</text>

    <!-- Графа 1 — Наименование изделия (центральная, большая) -->
    <line class="stamp-line" x1="120" y1="25" x2="120" y2="55"/>
    <line class="stamp-line" x1="120" y1="40" x2="185" y2="40"/>
    <line class="stamp-line" x1="120" y1="48" x2="185" y2="48"/>

    <text x="92" y="32" class="label" text-anchor="middle" font-weight="bold">КР СП ИУ5-42Б</text>
    <text x="92" y="40" class="label" text-anchor="middle" font-weight="bold">Резидентная программа</text>
    <text x="92" y="48" class="label" text-anchor="middle">(вариант №5)</text>
    <text x="92" y="54" class="label" text-anchor="middle">Воробьев Е. А.</text>

    <!-- Графа 2 — Обозначение документа -->
    <!-- (правый верх 65×15) -->
    <text x="152" y="32" class="label" text-anchor="middle">Лит.</text>
    <text x="152" y="37" class="label" text-anchor="middle">У</text>

    <text x="135" y="32" class="label" text-anchor="middle">Стр</text>
    <text x="135" y="37" class="label" text-anchor="middle">КР</text>

    <text x="172" y="32" class="label" text-anchor="middle">Лист</text>
    <text x="172" y="37" class="label" text-anchor="middle">1</text>

    <text x="152" y="46" class="label" text-anchor="middle">Листов</text>
    <text x="152" y="52" class="label" text-anchor="middle">1</text>

    <!-- Графа 9 — Учебное заведение -->
    <text x="152" y="53" class="label" text-anchor="middle">МГТУ им. Н.Э. Баумана, ИУ-5</text>
  </g>

  <!-- Подпись внизу-слева -->
  <text x="25" y="589" class="label" transform="rotate(-90, 25, 589)">Курсовая работа по дисциплине «Системное программирование»</text>
</svg>
